name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    name: Build APK on GitHub
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate native Android project (expo prebuild)
        working-directory: artifacts/crypto-exchange
        run: npx expo prebuild --platform android --clean --no-install

      - name: Make gradlew executable
        working-directory: artifacts/crypto-exchange/android
        run: chmod +x ./gradlew

      - name: Build release APK
        working-directory: artifacts/crypto-exchange/android
        env:
          EXPO_PUBLIC_DOMAIN: exchange.ucchain.org
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Locate APK
        id: find_apk
        working-directory: artifacts/crypto-exchange/android
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -n 1)
          echo "Found APK: $APK"
          echo "apk_path=artifacts/crypto-exchange/android/$APK" >> $GITHUB_OUTPUT

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryptox-exchange-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30
