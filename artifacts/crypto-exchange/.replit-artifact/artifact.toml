kind = "mobile"
previewPath = "/"
title = "CryptoX Exchange"
version = "1.0.0"
id = "artifacts/crypto-exchange"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24725

[services.development]
run = "pnpm --filter @workspace/crypto-exchange run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crypto-exchange", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/crypto-exchange", "run", "serve" ]

[services.env]
PORT = "24725"
BASE_PATH = "/"
